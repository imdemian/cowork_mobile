name: Flutter CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# --- CAMBIO #1 ---
# Eliminamos la variable 'env' porque ahora especificaremos el canal directamente.
# env:
#   FLUTTER_VERSION: "stable"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # --- CAMBIO #2 ---
          # Usamos 'channel' en lugar de 'flutter-version' para mayor claridad.
          channel: 'stable'
          cache: true
          # La configuración de caché puede ser simplificada ya que el 'channel' es la clave.
          cache-key: flutter-stable

      - name: Show Flutter and Dart versions
        run: |
          flutter --version
          dart --version

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --fatal-infos

      - name: Run tests
        if: ${{ hashFiles('test/**_test.dart') != '' }}
        run: flutter test

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # --- CAMBIO #3 ---
          # Aplicamos el mismo cambio aquí para consistencia.
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
