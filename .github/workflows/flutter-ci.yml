name: Flutter CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  # Te recomiendo usar 'stable' para no tener que actualizar esto manualmente.
  # Pero si prefieres una versión específica, déjalo como está.
  FLUTTER_VERSION: "stable" 

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
          cache-key: flutter-${{ env.FLUTTER_VERSION }}
          cache-path: ${{ runner.tool_cache }}/flutter

      - name: Show Flutter and Dart versions
        run: |
          flutter --version
          dart --version

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        # --- CAMBIO #1 ---
        # Añadimos --fatal-infos para que las advertencias también fallen el build,
        # manteniendo el código más limpio.
        run: flutter analyze --fatal-infos

      - name: Run tests
        # --- CAMBIO #2 ---
        # Añadimos la condición 'if'. Este paso solo se ejecutará si existen
        # archivos de prueba, evitando el error si la carpeta 'test' está vacía o no existe.
        if: ${{ hashFiles('test/**_test.dart') != '' }}
        run: flutter test

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test # Esto es correcto, el build solo se ejecuta si el job 'test' pasa.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
